<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宏观日报</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-grid">
          <div>
            <p class="eyebrow">宏观日报</p>
            <h1 id="site-title">加载中...</h1>
            <p id="site-subtitle" class="subtitle"></p>
            <p id="latest-headline" class="headline"></p>
            <p id="latest-summary" class="summary"></p>
          </div>
          <div class="hero-side card subtle-card">
            <p class="section-tag">今日主线总述</p>
            <h2>先读结论，再看重点事件</h2>
            <div id="daily-counts" class="count-grid"></div>
            <div id="hero-outlook" class="hero-outlook"></div>
          </div>
        </div>
        <div class="meta-row">
          <span id="generated-at"></span>
          <span id="site-mode"></span>
          <span id="daily-generated-at"></span>
          <a class="repo-link" href="https://github.com/mengda0231/Macro-daily" target="_blank" rel="noreferrer">GitHub 仓库</a>
        </div>
      </header>

      <main class="layout">
        <section class="main-column">
          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">今日宏观判断</p>
                <h2 id="latest-date"></h2>
                <p id="coverage-window" class="entry-meta"></p>
              </div>
              <span id="latest-mode" class="pill"></span>
            </div>
            <div id="judgment-list" class="judgment-list"></div>
            <div id="user-confirmation" class="confirmation-list"></div>
            <div id="watchpoints" class="watchpoints"></div>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">今日主线总述</p>
                <h2>文章式总述、主情景与备选情景</h2>
              </div>
            </div>
            <div id="lead-paragraphs" class="lead-paragraphs"></div>
            <div id="scenario-overview" class="scenario-grid"></div>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">重点点评卡</p>
                <h2>今天最值得看的宏观事件</h2>
              </div>
            </div>
            <div id="lead-focus-card" class="lead-focus-card"></div>
            <div id="focus-cards" class="focus-cards"></div>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">次级关注</p>
                <h2>有增量，但暂不到主线级别</h2>
              </div>
            </div>
            <div id="secondary-list" class="stack-list"></div>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">背景与降级信息</p>
                <h2>保留记录，但不抢主视图</h2>
              </div>
            </div>
            <details class="background-details">
              <summary>展开查看背景层事件</summary>
              <p class="section-tag">窗口内背景</p>
              <div id="background-list" class="stack-list"></div>
              <p class="section-tag">窗口外背景</p>
              <div id="context-background-list" class="stack-list"></div>
            </details>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">证据池与确认状态</p>
                <h2>判断之后，再回头看主证据、确认状态与分桶证据池</h2>
              </div>
            </div>
            <div id="evidence-digest" class="digest-grid"></div>
            <div id="official-confirmation-list" class="stack-list"></div>
            <div id="evidence-sections" class="evidence-grid"></div>
          </section>
        </section>

        <aside class="sidebar">
          <section class="card">
            <p class="section-tag">今日资产映射</p>
            <div id="asset-map" class="asset-map"></div>
          </section>

          <section class="card">
            <p class="section-tag">重点跟踪指标</p>
            <div id="follow-up-signals" class="compact-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">行业 / A股跟进路线</p>
            <div id="macro-route-summary" class="route-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">监控逻辑</p>
            <p id="monitoring-strategy" class="small-copy"></p>
            <div id="monitoring-notes" class="monitoring-notes"></div>
          </section>

          <section class="card">
            <p class="section-tag">监控信源</p>
            <div id="monitoring-sources" class="source-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">框架锚点</p>
            <div id="framework-notes" class="compact-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">历史判断</p>
            <div id="history-list" class="history-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <script>
      function createNode(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text) node.textContent = text;
        return node;
      }

      function renderCardTitle(item) {
        const title = document.createElement(item.url ? 'a' : 'span');
        title.className = 'entry-title';
        title.textContent = item.title_zh || item.title || '未命名条目';
        if (item.url) {
          title.href = item.url;
          title.target = '_blank';
          title.rel = 'noreferrer';
        }
        return title;
      }

      function formatSourceTier(sourceTier) {
        const mapping = {
          'Tier 1': 'Tier 1 官方',
          'Tier 2': 'Tier 2 主流媒体',
          'Tier 3': 'Tier 3 热点报道',
          'Tier 4': 'Tier 4 社媒线索',
        };
        return mapping[sourceTier] || sourceTier || '';
      }

      function formatPublishedAt(item) {
        if (item.published_at) return item.published_at;
        if ((item.timestamp_confidence || '') === 'low') return '时间待核';
        return '';
      }

      function buildSourceMeta(item, extraParts) {
        const parts = [];
        if (item.source_name_zh || item.source_name) parts.push(item.source_name_zh || item.source_name);
        if (item.source_tier) parts.push(formatSourceTier(item.source_tier));
        const publishedAt = formatPublishedAt(item);
        if (publishedAt) parts.push(publishedAt);
        if (item.event_type) parts.push(item.event_type);
        if (item.context_role) parts.push(item.context_role);
        if (extraParts && extraParts.length) {
          extraParts.filter(Boolean).forEach((part) => parts.push(part));
        }
        return parts.join(' | ');
      }

      function appendOriginalTitle(container, item) {
        if (!item.source_title_original) return;
        container.appendChild(createNode('p', 'entry-summary entry-summary--subtle', '原文标题：' + item.source_title_original));
      }

      function renderAssetChips(assets, className) {
        const wrap = createNode('div', className || 'asset-chip-row');
        const labels = {
          a_h_share: '股',
          rates: '利率',
          fx: '汇率',
          gold: '黄金',
          oil_commodities: '商品',
        };
        Object.entries(assets || {}).forEach(([key, detail]) => {
          const chip = createNode('div', 'asset-chip');
          chip.appendChild(createNode('strong', '', labels[key] || key));
          chip.appendChild(createNode('span', 'asset-chip-pill stance-' + (detail.score > 0 ? 'up' : detail.score < 0 ? 'down' : 'flat'), detail.bias));
          wrap.appendChild(chip);
        });
        return wrap;
      }

      function joinText(values) {
        return (values || []).filter(Boolean).join('；');
      }

      function formatConfirmation(item) {
        if (item.category === 'official-primary' || item.category === 'official-secondary') {
          return '官方来源本体，可作为确认锚点。';
        }
        const qualityLabel = {
          strong: '强确认',
          partial: '部分确认',
          weak: '弱确认',
          unmatched: '未确认',
        };
        const matched = (item.matched_official_sources || []).map((entry) => entry.source_name || entry.source_id || '').filter(Boolean);
        if (matched.length > 0) {
          return '已匹配官方来源：' + matched.join('、') + '；匹配强度：' + (qualityLabel[item.confirmation_match_quality] || item.confirmation_match_quality || '待评估');
        }
        if (item.confirmation_gap_reason) {
          return '仍需官方确认：' + item.confirmation_gap_reason;
        }
        if (item.confirmation_required) {
          return '当前仍属媒体线索层，不能跳过官方确认。';
        }
        return '';
      }

      function formatMediaContract(item) {
        const tierLabel = {
          visible_body: '正文可见',
          partial_visible_body: '正文部分可见',
          excerpt: '摘要可见',
          headline: '仅标题',
          blocked: '受限',
        };
        const kindLabel = {
          article: '文章',
          aggregated_feed: '聚合流',
          quote_page: '行情页',
          market_page: '市场页',
          section_page: '栏目页',
        };
        const parts = [];
        if (item.content_tier) {
          parts.push('可见性：' + (tierLabel[item.content_tier] || item.content_tier));
        }
        if (item.media_item_kind) {
          parts.push('类型：' + (kindLabel[item.media_item_kind] || item.media_item_kind));
        }
        if (item.paywall_state && item.paywall_state !== 'open') {
          parts.push('访问状态：' + item.paywall_state);
        }
        if (item.landing_drift && item.landing_drift !== 'none') {
          parts.push('落地漂移：' + item.landing_drift);
        }
        if (typeof item.visible_paragraph_count === 'number' && item.visible_paragraph_count > 0) {
          parts.push('可见段落：' + item.visible_paragraph_count);
        }
        return parts.join('；');
      }

      function renderSimpleList(title, items, emptyText) {
        const card = createNode('article', 'digest-card');
        card.appendChild(createNode('h3', '', title));
        const list = createNode('div', 'compact-list');
        if (!items || items.length === 0) {
          list.appendChild(createNode('div', 'list-row', emptyText));
        } else {
          items.forEach((item) => {
            list.appendChild(createNode('div', 'list-row', item));
          });
        }
        card.appendChild(list);
        return card;
      }

      function renderEvidenceEntry(entry, mode) {
        const row = createNode('div', 'digest-entry');
        const sourceName = entry.source_name_zh || entry.source_name || entry.source_id || '未命名来源';
        row.appendChild(createNode('strong', '', entry.headline_zh || entry.headline || sourceName));
        const metaParts = [sourceName];
        const tierMap = {
          visible_body: '正文可见',
          partial_visible_body: '正文部分可见',
          excerpt: '摘要可见',
          headline: '仅标题',
          blocked: '受限',
        };
        const roleMap = {
          official_anchor: '官方锚点',
          clue_high: '高信号线索',
          confirmation_support: '确认支持',
          alert_only: '提示线索',
          market_context_only: '市场上下文',
        };
        if (entry.content_tier) metaParts.push('可见性：' + (tierMap[entry.content_tier] || entry.content_tier));
        if (entry.evidence_role) metaParts.push('角色：' + (roleMap[entry.evidence_role] || entry.evidence_role));
        if (entry.confirmation_match_quality) metaParts.push('确认：' + entry.confirmation_match_quality);
        if ((mode === 'official' || mode === 'media') && (entry.summary_zh || entry.summary)) {
          row.appendChild(createNode('p', 'entry-summary', entry.summary_zh || entry.summary));
        }
        row.appendChild(createNode('div', 'entry-meta', metaParts.join(' | ')));
        return row;
      }

      function renderDigestCard(title, entries, mode, emptyText) {
        const card = createNode('article', 'digest-card');
        card.appendChild(createNode('h3', '', title));
        const list = createNode('div', 'compact-list');
        if (!entries || entries.length === 0) {
          list.appendChild(createNode('div', 'list-row', emptyText));
        } else {
          entries.forEach((entry) => list.appendChild(renderEvidenceEntry(entry, mode)));
        }
        card.appendChild(list);
        return card;
      }

      function renderConfirmationStatus(item) {
        const card = createNode('article', 'stack-item');
        const statusMap = {
          'confirmed-primary': '官方一级确认',
          'confirmed-secondary': '官方二级确认',
          'pending-required': '仍待确认',
        };
        card.appendChild(createNode('strong', '', item.claim_zh || item.claim || '待确认断言'));
        card.appendChild(createNode('div', 'entry-meta', statusMap[item.confirmation_status] || item.confirmation_status || '待确认'));
        if (item.official_source) {
          card.appendChild(createNode('p', 'entry-summary', '确认来源：' + item.official_source));
        }
        if (item.remaining_uncertainty) {
          card.appendChild(createNode('p', 'entry-summary', '剩余不确定：' + item.remaining_uncertainty));
        }
        if ((item.matched_official_sources || []).length > 0) {
          const anchors = (item.matched_official_sources || []).map((entry) => entry.source_name || entry.source_id || '').filter(Boolean);
          card.appendChild(createNode('p', 'entry-summary', '候选官方锚点：' + anchors.join('、')));
        }
        return card;
      }

      function renderRouteSummary(routeMap) {
        const sections = [
          ['受影响行业', routeMap.affected_industries || []],
          ['A股 beta 跟踪篮子', routeMap.beta_basket || []],
          ['alpha 深挖入口', routeMap.alpha_deep_dive || []],
          ['行业 alpha 线索', routeMap.alpha_candidates || []],
        ];
        const wrap = createNode('div', 'route-grid');
        sections.forEach(([title, items]) => {
          wrap.appendChild(renderSimpleList(title, items, '今天暂未形成稳定路线。'));
        });
        return wrap;
      }

      function renderFocusCard(item, lead) {
        const card = createNode('article', lead ? 'focus-card focus-card--lead' : 'focus-card');
        const top = createNode('div', 'card-top');
        const level = createNode('span', 'pill level-pill', item.importance_level);
        const basis = item.analysis_basis ? item.analysis_basis : '标题/摘要';
        const meta = createNode('span', 'entry-meta', buildSourceMeta(item, [basis, item.confidence ? item.confidence + '置信度' : '']));
        top.appendChild(level);
        top.appendChild(meta);
        card.appendChild(top);
        card.appendChild(renderCardTitle(item));
        appendOriginalTitle(card, item);
        if (item.market_implication && item.market_implication.assets) {
          card.appendChild(renderAssetChips(item.market_implication.assets, lead ? 'asset-chip-row asset-chip-row--lead' : 'asset-chip-row'));
        }

        const sections = [
          ['发生了什么', item.what_happened_zh || item.what_happened],
          ['中文摘要', item.summary_zh || item.analysis_summary],
          ['入选原因', item.selection_reason],
          ['为什么重要', item.why_it_matters],
          ['核心矛盾', item.core_contradiction],
          ['数据校验', item.data_validation_note],
          ['传导链', (item.macro_transmission || []).join(' -> ')],
          ['当前采用视角', item.active_scenario_label ? (item.active_scenario_label + '：' + (item.active_scenario || '')) : ''],
          ['替代视角', item.alternative_scenario_label ? (item.alternative_scenario_label + '：' + (item.alternative_scenario || '')) : ''],
          ['切换条件', (item.scenario_switch_signals || []).slice(0, 3).join('；')],
          ['为什么今天先不用另一个视角', item.scenario_why_not_alternative || item.why_this_scenario],
          ['投资含义', item.market_implication ? item.market_implication.summary : ''],
          ['官方确认', formatConfirmation(item)],
          ['媒体可见性', formatMediaContract(item)],
          ['证伪点', joinText(item.falsification_points || [])],
          ['受影响行业', joinText(item.affected_industries || [])],
          ['A股 beta 路线', joinText((item.ashare_research_routes || {}).beta_basket || item.ashare_followthrough_candidates || [])],
          ['A股 alpha 深挖', joinText((item.ashare_research_routes || {}).alpha_deep_dive || (item.industry_impact_map || {}).alpha_candidates || [])],
          ['跟踪点', (item.follow_up_signals || []).slice(0, 3).join('；')],
        ];

        sections.forEach(([label, value]) => {
          if (!value) return;
          const row = createNode('div', 'analysis-row');
          row.appendChild(createNode('strong', '', label + '：'));
          row.appendChild(createNode('span', '', value));
          card.appendChild(row);
        });
        if (item.url) {
          card.appendChild(createNode('p', 'entry-summary entry-summary--subtle', '原文来源：' + item.url));
        }
        return card;
      }

      function renderScenarioCard(item) {
        const card = createNode('article', 'scenario-card');
        const top = createNode('div', 'scenario-top');
        top.appendChild(createNode('p', 'scenario-topic', item.topic || item.topic_id || '情景主题'));
        if (item.active_label) {
          top.appendChild(createNode('span', 'pill scenario-pill', '主情景：' + item.active_label));
        }
        card.appendChild(top);

        if (item.consensus) {
          const consensus = createNode('p', 'scenario-summary');
          consensus.innerHTML = '<strong>当前共识：</strong>' + item.consensus;
          card.appendChild(consensus);
        }

        const rows = [
          ['当前主情景', item.active_label ? (item.active_label + '：' + (item.active_scenario || '')) : item.active_scenario],
          ['为什么今天更偏这个情景', item.why_active],
          ['备选情景', item.alternative_label ? (item.alternative_label + '：' + (item.alternative_scenario || '')) : item.alternative_scenario],
          ['切换条件', (item.scenario_switch_signals || []).slice(0, 3).join('；')],
          ['失效条件', (item.invalidations || []).slice(0, 2).join('；')],
        ];

        rows.forEach(([label, value]) => {
          if (!value) return;
          const row = createNode('div', 'analysis-row');
          row.appendChild(createNode('strong', '', label + '：'));
          row.appendChild(createNode('span', '', value));
          card.appendChild(row);
        });

        if (item.framework_support_note) {
          card.appendChild(createNode('p', 'scenario-source', item.framework_support_note));
        }
        return card;
      }

      function renderMainlineCard(item, lead) {
        const card = createNode('article', lead ? 'focus-card focus-card--lead' : 'focus-card');
        const top = createNode('div', 'card-top');
        top.appendChild(createNode('span', 'pill level-pill', item.card_kind || '存量主线'));
        top.appendChild(createNode('span', 'entry-meta', '无新增 A 级事件时，用存量主线继续组织判断'));
        card.appendChild(top);
        card.appendChild(createNode('div', 'entry-title', item.title_zh || item.title || '存量主线'));

        const sections = [
          ['主线摘要', item.summary],
          ['为什么今天仍沿用', item.why_now],
          ['当前采用视角', item.current_view],
          ['备选视角或核心矛盾', item.alternative_view],
          ['切换条件', joinText(item.switch_signals || [])],
          ['今日资产含义', joinText(item.asset_hint_lines || [])],
          ['支撑条目', joinText(item.supporting_items || [])],
          ['跟踪点', joinText(item.follow_up_signals || [])],
          ['框架支持', item.framework_support_note],
        ];

        sections.forEach(([label, value]) => {
          if (!value) return;
          const row = createNode('div', 'analysis-row');
          row.appendChild(createNode('strong', '', label + '：'));
          row.appendChild(createNode('span', '', value));
          card.appendChild(row);
        });
        return card;
      }

      function renderConfirmationItem(item) {
        const card = createNode('article', 'confirmation-item');
        const title = createNode('strong', '', item.topic || '待确认问题');
        card.appendChild(title);
        if (item.conflict) {
          card.appendChild(createNode('p', 'entry-summary', '冲突点：' + item.conflict));
        }
        if (item.current_view) {
          card.appendChild(createNode('p', 'entry-summary', '当前倾向：' + item.current_view));
        }
        if (item.missing_signal) {
          card.appendChild(createNode('p', 'entry-summary', '缺失确认：' + item.missing_signal));
        }
        return card;
      }

      function renderStackItem(item) {
        const wrap = createNode('article', 'stack-item');
        const header = createNode('div', 'stack-header');
        header.appendChild(renderCardTitle(item));
        header.appendChild(createNode('span', 'pill small-pill', item.importance_level));
        wrap.appendChild(header);
        appendOriginalTitle(wrap, item);
        wrap.appendChild(createNode('div', 'entry-meta', buildSourceMeta(item)));
        if (item.summary_zh) wrap.appendChild(createNode('p', 'entry-summary', item.summary_zh));
        if (item.analysis_summary) wrap.appendChild(createNode('p', 'entry-summary', item.analysis_summary));
        if (item.selection_reason) {
          wrap.appendChild(createNode('p', 'entry-summary', '入选原因：' + item.selection_reason));
        }
        if (item.core_contradiction) {
          wrap.appendChild(createNode('p', 'entry-summary', '核心矛盾：' + item.core_contradiction));
        }
        if (item.scenario_why_not_alternative || item.why_this_scenario) {
          wrap.appendChild(createNode('p', 'entry-summary', '当前视角：' + (item.scenario_why_not_alternative || item.why_this_scenario)));
        }
        if (item.market_implication && item.market_implication.summary) {
          wrap.appendChild(createNode('p', 'entry-summary', '投资含义：' + item.market_implication.summary));
        }
        if ((item.follow_up_signals || []).length > 0) {
          wrap.appendChild(createNode('p', 'entry-summary', '跟踪点：' + (item.follow_up_signals || []).slice(0, 3).join('；')));
        }
        if (item.downgrade_reason) wrap.appendChild(createNode('p', 'entry-summary', '降级原因：' + item.downgrade_reason));
        return wrap;
      }

      function renderEvidenceSection(section) {
        const card = createNode('article', 'evidence-card');
        card.appendChild(createNode('h3', '', section.title));
        if (section.hint) card.appendChild(createNode('p', 'section-hint', section.hint));
        const list = createNode('div', 'evidence-list');
        (section.items || []).forEach((item) => {
          const row = createNode('div', 'evidence-item');
          row.appendChild(renderCardTitle(item));
          row.appendChild(createNode('div', 'entry-meta', [item.source_name, item.importance_level].join(' | ')));
          row.appendChild(createNode('p', 'entry-summary', item.summary_zh || item.analysis_summary));
          list.appendChild(row);
        });
        card.appendChild(list);
        return card;
      }

      async function main() {
        const response = await fetch('./data/latest.json', { cache: 'no-store' });
        const payload = await response.json();
        const latest = payload.latest;

        document.getElementById('site-title').textContent = payload.site.title;
        document.getElementById('site-subtitle').textContent = payload.site.subtitle;
        document.getElementById('latest-date').textContent = latest.date;
        const coverageWindow = latest.coverage_window || {};
        document.getElementById('coverage-window').textContent = coverageWindow.label ? ('本期覆盖时间：' + coverageWindow.label) : '';
        document.getElementById('latest-headline').textContent = latest.headline_zh || latest.headline;
        document.getElementById('latest-summary').textContent = latest.lead_summary || latest.summary;
        document.getElementById('generated-at').textContent = '页面生成时间：' + payload.site.generated_at;
        document.getElementById('site-mode').textContent = '页面模式：' + payload.site.mode;
        document.getElementById('latest-mode').textContent = latest.mode || '分析日报';
        if (latest.daily_input_generated_at) {
          document.getElementById('daily-generated-at').textContent = '分析生成时间：' + latest.daily_input_generated_at;
        }

        const countMap = {
          focus: '重点',
          secondary: '关注',
          background: '窗口内背景',
          context_background: '窗口外背景',
          ignored: '忽略',
          raw_items_total: '原始条目',
        };
        const countsWrap = document.getElementById('daily-counts');
        Object.entries(latest.daily_input_counts || {}).forEach(([key, value]) => {
          const box = createNode('div', 'count-box');
          box.innerHTML = '<strong>' + value + '</strong><span>' + (countMap[key] || key) + '</span>';
          countsWrap.appendChild(box);
        });

        const judgmentWrap = document.getElementById('judgment-list');
        (latest.judgments || []).forEach((text) => {
          const row = createNode('div', 'judgment-item');
          row.appendChild(createNode('span', 'bullet-dot'));
          row.appendChild(createNode('span', '', text));
          judgmentWrap.appendChild(row);
        });

        const leadParagraphWrap = document.getElementById('lead-paragraphs');
        (latest.lead_paragraphs || []).forEach((text) => {
          leadParagraphWrap.appendChild(createNode('p', 'lead-paragraph', text));
        });
        if (!leadParagraphWrap.children.length) {
          leadParagraphWrap.appendChild(createNode('div', 'empty-state', '今天暂时没有可展示的主线总述。'));
        }

        const scenarioWrap = document.getElementById('scenario-overview');
        (latest.scenario_overview || []).forEach((item) => {
          scenarioWrap.appendChild(renderScenarioCard(item));
        });
        if (!scenarioWrap.children.length) {
          scenarioWrap.appendChild(createNode('div', 'empty-state', '当前没有可展示的情景矩阵，先沿用今日判断与证据池观察。'));
        }

        const confirmationWrap = document.getElementById('user-confirmation');
        const confirmations = latest.needs_user_confirmation || [];
        if (confirmations.length > 0) {
          const head = createNode('div', 'confirmation-head');
          head.appendChild(createNode('strong', '', '待你确认的高影响分歧'));
          head.appendChild(createNode('span', 'entry-meta', '这些问题会改变首页主判断或多个资产映射'));
          confirmationWrap.appendChild(head);
          confirmations.forEach((item) => confirmationWrap.appendChild(renderConfirmationItem(item)));
        }

        const watchpointWrap = document.getElementById('watchpoints');
        (latest.watchpoints || []).forEach((text) => {
          watchpointWrap.appendChild(createNode('div', 'watchpoint', text));
        });

        const digestWrap = document.getElementById('evidence-digest');
        const digest = latest.evidence_digest || {};
        digestWrap.appendChild(renderDigestCard('主证据', digest.primary_evidence || [], 'official', '今天还没有稳定主证据。'));
        digestWrap.appendChild(renderDigestCard('高信号媒体', digest.high_signal_media || [], 'media', '今天没有高信号媒体线索。'));
        digestWrap.appendChild(renderSimpleList('开放缺口', digest.open_gaps || [], '当前没有显式证据缺口。'));

        const officialWrap = document.getElementById('official-confirmation-list');
        const officialConfirmation = latest.official_confirmation || [];
        if (officialConfirmation.length > 0) {
          officialConfirmation.forEach((item) => officialWrap.appendChild(renderConfirmationStatus(item)));
        } else {
          officialWrap.appendChild(createNode('div', 'empty-state', '今天没有额外的官方确认状态需要单独提示。'));
        }

        const focusWrap = document.getElementById('focus-cards');
        const leadFocusWrap = document.getElementById('lead-focus-card');
        const focusItems = latest.focus_cards || [];
        if (focusItems.length > 0) {
          leadFocusWrap.appendChild(renderFocusCard(focusItems[0], true));
          focusItems.slice(1).forEach((item) => focusWrap.appendChild(renderFocusCard(item, false)));
        } else {
          const mainlineCards = latest.mainline_cards || [];
          if (mainlineCards.length > 0) {
            leadFocusWrap.appendChild(renderMainlineCard(mainlineCards[0], true));
            mainlineCards.slice(1).forEach((item) => focusWrap.appendChild(renderMainlineCard(item, false)));
          } else {
            leadFocusWrap.appendChild(createNode('div', 'empty-state', '今天没有足够高质量的新重点事件上首页，先沿用存量主线、情景矩阵和次级关注继续跟踪。'));
          }
        }

        const secondaryWrap = document.getElementById('secondary-list');
        (latest.secondary_items || []).forEach((item) => secondaryWrap.appendChild(renderStackItem(item)));
        if (!secondaryWrap.children.length) {
          secondaryWrap.appendChild(createNode('div', 'empty-state', '今天没有额外的次级关注条目。'));
        }

        const backgroundWrap = document.getElementById('background-list');
        (latest.background_items || []).forEach((item) => backgroundWrap.appendChild(renderStackItem(item)));
        if (!backgroundWrap.children.length) {
          backgroundWrap.appendChild(createNode('div', 'empty-state', '今天没有窗口内背景条目。'));
        }

        const contextBackgroundWrap = document.getElementById('context-background-list');
        (latest.context_background_items || []).forEach((item) => contextBackgroundWrap.appendChild(renderStackItem(item)));
        if (!contextBackgroundWrap.children.length) {
          contextBackgroundWrap.appendChild(createNode('div', 'empty-state', '今天没有补充的窗口外背景。'));
        }

        const evidenceWrap = document.getElementById('evidence-sections');
        (latest.evidence_sections || []).forEach((section) => evidenceWrap.appendChild(renderEvidenceSection(section)));
        if (!evidenceWrap.children.length) {
          evidenceWrap.appendChild(createNode('div', 'empty-state', '今天没有可展示的分桶证据池。'));
        }

        const assetWrap = document.getElementById('asset-map');
        (latest.asset_map || []).forEach((item) => {
          const row = createNode('div', 'asset-item stance-' + (item.score > 0 ? 'up' : item.score < 0 ? 'down' : 'flat'));
          row.appendChild(createNode('strong', '', item.label));
          row.appendChild(createNode('span', 'pill asset-pill', item.stance));
          row.appendChild(createNode('p', 'entry-summary', item.reason));
          assetWrap.appendChild(row);
        });

        const heroOutlookWrap = document.getElementById('hero-outlook');
        (latest.asset_map || []).slice(0, 4).forEach((item) => {
          const chip = createNode('div', 'hero-outlook-item stance-' + (item.score > 0 ? 'up' : item.score < 0 ? 'down' : 'flat'));
          chip.appendChild(createNode('strong', '', item.label));
          chip.appendChild(createNode('span', '', item.stance));
          heroOutlookWrap.appendChild(chip);
        });

        const signalWrap = document.getElementById('follow-up-signals');
        (latest.follow_up_signals || []).forEach((text) => {
          signalWrap.appendChild(createNode('div', 'list-row', text));
        });

        const routeWrap = document.getElementById('macro-route-summary');
        routeWrap.appendChild(renderRouteSummary(latest.macro_research_routes || {}));

        const logic = latest.monitoring_logic || {};
        document.getElementById('monitoring-strategy').textContent = logic.core_rule || '';
        const noteWrap = document.getElementById('monitoring-notes');
        (logic.selection_notes || []).forEach((text) => noteWrap.appendChild(createNode('div', 'note-row', text)));

        const sourceWrap = document.getElementById('monitoring-sources');
        (latest.monitoring_sources || []).forEach((source) => {
          const row = createNode('div', 'source-item');
          row.innerHTML =
            '<strong>' + source.name + '</strong>' +
            '<span>' + [source.category_label, source.priority, source.region, source.trust_label].join(' | ') + '</span>' +
            '<span>更新频率：' + source.cadence_label + '</span>' +
            '<a class="repo-link" href="' + source.homepage_url + '" target="_blank" rel="noreferrer">' + source.homepage_url + '</a>' +
            '<span>' + source.notes + '</span>';
          sourceWrap.appendChild(row);
        });

        const frameworkWrap = document.getElementById('framework-notes');
        (latest.framework_notes || []).forEach((text) => frameworkWrap.appendChild(createNode('div', 'list-row', text)));

        const historyWrap = document.getElementById('history-list');
        (payload.history || []).forEach((item) => {
          const row = createNode('div', 'history-item');
          row.appendChild(createNode('strong', '', item.date));
          row.appendChild(createNode('span', '', item.headline));
          row.appendChild(createNode('em', '', item.status));
          historyWrap.appendChild(row);
        });
      }

      main().catch((error) => {
        console.error(error);
        document.getElementById('site-title').textContent = '宏观日报';
        document.getElementById('site-subtitle').textContent = '站点数据加载失败。';
      });
    </script>
  </body>
</html>
