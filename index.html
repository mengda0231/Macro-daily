<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宏观日报</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-grid">
          <div>
            <p class="eyebrow">宏观日报</p>
            <h1 id="site-title">加载中...</h1>
            <p id="site-subtitle" class="subtitle"></p>
            <p id="latest-headline" class="headline"></p>
            <p id="latest-summary" class="summary"></p>
          </div>
          <div class="hero-side card subtle-card">
            <p class="section-tag">今日框架</p>
            <h2>先结论，再证据，再背景</h2>
            <div id="daily-counts" class="count-grid"></div>
          </div>
        </div>
        <div class="meta-row">
          <span id="generated-at"></span>
          <span id="site-mode"></span>
          <span id="daily-generated-at"></span>
          <a class="repo-link" href="https://github.com/mengda0231/Macro-daily" target="_blank" rel="noreferrer">GitHub 仓库</a>
        </div>
      </header>

      <main class="layout">
        <section class="main-column">
          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">今日宏观判断</p>
                <h2 id="latest-date"></h2>
              </div>
              <span id="latest-mode" class="pill"></span>
            </div>
            <div id="judgment-list" class="judgment-list"></div>
            <div id="watchpoints" class="watchpoints"></div>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">重点点评卡</p>
                <h2>今天最值得看的宏观事件</h2>
              </div>
            </div>
            <div id="focus-cards" class="focus-cards"></div>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">次级关注</p>
                <h2>有增量，但暂不到主线级别</h2>
              </div>
            </div>
            <div id="secondary-list" class="stack-list"></div>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">背景与降级信息</p>
                <h2>保留记录，但不抢主视图</h2>
              </div>
            </div>
            <details class="background-details" open>
              <summary>展开查看背景层事件</summary>
              <div id="background-list" class="stack-list"></div>
            </details>
          </section>

          <section class="card panel">
            <div class="panel-head">
              <div>
                <p class="section-tag">分桶证据池</p>
                <h2>用于验证主线，不替代重点判断</h2>
              </div>
            </div>
            <div id="evidence-sections" class="evidence-grid"></div>
          </section>
        </section>

        <aside class="sidebar">
          <section class="card">
            <p class="section-tag">今日资产映射</p>
            <div id="asset-map" class="asset-map"></div>
          </section>

          <section class="card">
            <p class="section-tag">重点跟踪指标</p>
            <div id="follow-up-signals" class="compact-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">监控逻辑</p>
            <p id="monitoring-strategy" class="small-copy"></p>
            <div id="monitoring-notes" class="monitoring-notes"></div>
          </section>

          <section class="card">
            <p class="section-tag">监控信源</p>
            <div id="monitoring-sources" class="source-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">框架锚点</p>
            <div id="framework-notes" class="compact-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">历史判断</p>
            <div id="history-list" class="history-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <script>
      function createNode(tag, className, text) {
        const node = document.createElement(tag);
        if (className) node.className = className;
        if (text) node.textContent = text;
        return node;
      }

      function renderCardTitle(item) {
        const title = document.createElement(item.url ? 'a' : 'span');
        title.className = 'entry-title';
        title.textContent = item.title;
        if (item.url) {
          title.href = item.url;
          title.target = '_blank';
          title.rel = 'noreferrer';
        }
        return title;
      }

      function renderFocusCard(item) {
        const card = createNode('article', 'focus-card');
        const top = createNode('div', 'card-top');
        const level = createNode('span', 'pill level-pill', item.importance_level);
        const meta = createNode('span', 'entry-meta', [item.source_name, item.event_type, item.confidence + '置信度'].join(' | '));
        top.appendChild(level);
        top.appendChild(meta);
        card.appendChild(top);
        card.appendChild(renderCardTitle(item));

        const sections = [
          ['发生了什么', item.what_happened],
          ['为什么重要', item.why_it_matters],
          ['传导链', (item.macro_transmission || []).join(' -> ')],
          ['投资含义', item.market_implication ? item.market_implication.summary : ''],
          ['跟踪点', (item.follow_up_signals || []).slice(0, 3).join('；')],
        ];

        sections.forEach(([label, value]) => {
          if (!value) return;
          const row = createNode('div', 'analysis-row');
          row.appendChild(createNode('strong', '', label + '：'));
          row.appendChild(createNode('span', '', value));
          card.appendChild(row);
        });
        return card;
      }

      function renderStackItem(item) {
        const wrap = createNode('article', 'stack-item');
        const header = createNode('div', 'stack-header');
        header.appendChild(renderCardTitle(item));
        header.appendChild(createNode('span', 'pill small-pill', item.importance_level));
        wrap.appendChild(header);
        wrap.appendChild(createNode('div', 'entry-meta', [item.source_name, item.event_type].join(' | ')));
        if (item.analysis_summary) wrap.appendChild(createNode('p', 'entry-summary', item.analysis_summary));
        if (item.market_implication && item.market_implication.summary) {
          wrap.appendChild(createNode('p', 'entry-summary', '投资含义：' + item.market_implication.summary));
        }
        if (item.downgrade_reason) wrap.appendChild(createNode('p', 'entry-summary', '降级原因：' + item.downgrade_reason));
        return wrap;
      }

      function renderEvidenceSection(section) {
        const card = createNode('article', 'evidence-card');
        card.appendChild(createNode('h3', '', section.title));
        if (section.hint) card.appendChild(createNode('p', 'section-hint', section.hint));
        const list = createNode('div', 'evidence-list');
        (section.items || []).forEach((item) => {
          const row = createNode('div', 'evidence-item');
          row.appendChild(renderCardTitle(item));
          row.appendChild(createNode('div', 'entry-meta', [item.source_name, item.importance_level].join(' | ')));
          row.appendChild(createNode('p', 'entry-summary', item.analysis_summary));
          list.appendChild(row);
        });
        card.appendChild(list);
        return card;
      }

      async function main() {
        const response = await fetch('./data/latest.json', { cache: 'no-store' });
        const payload = await response.json();
        const latest = payload.latest;

        document.getElementById('site-title').textContent = payload.site.title;
        document.getElementById('site-subtitle').textContent = payload.site.subtitle;
        document.getElementById('latest-date').textContent = latest.date;
        document.getElementById('latest-headline').textContent = latest.headline;
        document.getElementById('latest-summary').textContent = latest.summary;
        document.getElementById('generated-at').textContent = '页面生成时间：' + payload.site.generated_at;
        document.getElementById('site-mode').textContent = '页面模式：' + payload.site.mode;
        document.getElementById('latest-mode').textContent = latest.mode || '分析日报';
        if (latest.daily_input_generated_at) {
          document.getElementById('daily-generated-at').textContent = '分析生成时间：' + latest.daily_input_generated_at;
        }

        const countMap = {
          focus: '重点',
          secondary: '关注',
          background: '背景',
          ignored: '忽略',
          raw_items_total: '原始条目',
        };
        const countsWrap = document.getElementById('daily-counts');
        Object.entries(latest.daily_input_counts || {}).forEach(([key, value]) => {
          const box = createNode('div', 'count-box');
          box.innerHTML = '<strong>' + value + '</strong><span>' + (countMap[key] || key) + '</span>';
          countsWrap.appendChild(box);
        });

        const judgmentWrap = document.getElementById('judgment-list');
        (latest.judgments || []).forEach((text) => {
          const row = createNode('div', 'judgment-item');
          row.appendChild(createNode('span', 'bullet-dot'));
          row.appendChild(createNode('span', '', text));
          judgmentWrap.appendChild(row);
        });

        const watchpointWrap = document.getElementById('watchpoints');
        (latest.watchpoints || []).forEach((text) => {
          watchpointWrap.appendChild(createNode('div', 'watchpoint', text));
        });

        const focusWrap = document.getElementById('focus-cards');
        (latest.focus_cards || []).forEach((item) => focusWrap.appendChild(renderFocusCard(item)));

        const secondaryWrap = document.getElementById('secondary-list');
        (latest.secondary_items || []).forEach((item) => secondaryWrap.appendChild(renderStackItem(item)));

        const backgroundWrap = document.getElementById('background-list');
        (latest.background_items || []).forEach((item) => backgroundWrap.appendChild(renderStackItem(item)));

        const evidenceWrap = document.getElementById('evidence-sections');
        (latest.evidence_sections || []).forEach((section) => evidenceWrap.appendChild(renderEvidenceSection(section)));

        const assetWrap = document.getElementById('asset-map');
        (latest.asset_map || []).forEach((item) => {
          const row = createNode('div', 'asset-item');
          row.appendChild(createNode('strong', '', item.label));
          row.appendChild(createNode('span', 'pill asset-pill', item.stance));
          row.appendChild(createNode('p', 'entry-summary', item.reason));
          assetWrap.appendChild(row);
        });

        const signalWrap = document.getElementById('follow-up-signals');
        (latest.follow_up_signals || []).forEach((text) => {
          signalWrap.appendChild(createNode('div', 'list-row', text));
        });

        const logic = latest.monitoring_logic || {};
        document.getElementById('monitoring-strategy').textContent = logic.core_rule || '';
        const noteWrap = document.getElementById('monitoring-notes');
        (logic.selection_notes || []).forEach((text) => noteWrap.appendChild(createNode('div', 'note-row', text)));

        const sourceWrap = document.getElementById('monitoring-sources');
        (latest.monitoring_sources || []).forEach((source) => {
          const row = createNode('div', 'source-item');
          row.innerHTML =
            '<strong>' + source.name + '</strong>' +
            '<span>' + [source.category_label, source.priority, source.region, source.trust_label].join(' | ') + '</span>' +
            '<span>更新频率：' + source.cadence_label + '</span>' +
            '<a class="repo-link" href="' + source.homepage_url + '" target="_blank" rel="noreferrer">' + source.homepage_url + '</a>' +
            '<span>' + source.notes + '</span>';
          sourceWrap.appendChild(row);
        });

        const frameworkWrap = document.getElementById('framework-notes');
        (latest.framework_notes || []).forEach((text) => frameworkWrap.appendChild(createNode('div', 'list-row', text)));

        const historyWrap = document.getElementById('history-list');
        (payload.history || []).forEach((item) => {
          const row = createNode('div', 'history-item');
          row.appendChild(createNode('strong', '', item.date));
          row.appendChild(createNode('span', '', item.headline));
          row.appendChild(createNode('em', '', item.status));
          historyWrap.appendChild(row);
        });
      }

      main().catch((error) => {
        console.error(error);
        document.getElementById('site-title').textContent = '宏观日报';
        document.getElementById('site-subtitle').textContent = '站点数据加载失败。';
      });
    </script>
  </body>
</html>
