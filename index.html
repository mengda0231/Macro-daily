<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>宏观日报</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-grid">
          <div>
            <p class="eyebrow">宏观日报</p>
            <h1 id="site-title">加载中...</h1>
            <p id="site-subtitle" class="subtitle"></p>
          </div>
          <div class="hero-side card subtle-card">
            <p class="section-tag">当前模式</p>
            <h2>框架底座 + 每日输入</h2>
            <p>
              官方宏观发布是主锚点，快讯和媒体信源保留为预警层，但不替代一手来源验证。
            </p>
            <div id="daily-counts" class="count-grid"></div>
          </div>
        </div>
        <div class="meta-row">
          <span id="generated-at"></span>
          <span id="site-mode"></span>
          <span id="daily-generated-at"></span>
          <a class="repo-link" href="https://github.com/mengda0231/Macro-daily" target="_blank" rel="noreferrer">GitHub 仓库</a>
        </div>
      </header>

      <main class="layout">
        <section class="latest-panel card">
          <div class="panel-head">
            <div>
              <p class="section-tag">最新日报</p>
              <h2 id="latest-date"></h2>
            </div>
            <span id="latest-mode" class="pill"></span>
          </div>
          <p id="latest-headline" class="headline"></p>
          <p id="latest-summary" class="summary"></p>
          <div id="watchpoints" class="watchpoints"></div>
          <div id="latest-sections" class="sections"></div>
        </section>

        <aside class="sidebar">
          <section class="card">
            <p class="section-tag">阅读锚点</p>
            <h3>如何使用这份日报</h3>
            <ul class="compact-list">
              <li>先抓核心矛盾，不要先盯价格波动。</li>
              <li>给每条信息先定位到传导层，再判断权重。</li>
              <li>每一版都要保留清晰的证伪区块。</li>
            </ul>
          </section>

          <section class="card">
            <p class="section-tag">源文件集合</p>
            <div id="source-docs" class="source-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">监控逻辑</p>
            <p id="monitoring-strategy" class="small-copy"></p>
            <div id="monitoring-notes" class="monitoring-notes"></div>
          </section>

          <section class="card">
            <p class="section-tag">监控信源</p>
            <div id="monitoring-sources" class="source-list"></div>
          </section>

          <section class="card">
            <p class="section-tag">历史记录</p>
            <div id="history-list" class="history-list"></div>
          </section>
        </aside>
      </main>
    </div>

    <script>
      function renderSectionItem(item) {
        if (typeof item === 'string') {
          const li = document.createElement('li');
          li.textContent = item;
          return li;
        }

        const li = document.createElement('li');
        li.className = 'entry-item';

        const title = document.createElement(item.url ? 'a' : 'span');
        title.className = 'entry-title';
        title.textContent = item.title;
        if (item.url) {
          title.href = item.url;
          title.target = '_blank';
          title.rel = 'noreferrer';
        }
        li.appendChild(title);

        if (item.meta) {
          const meta = document.createElement('div');
          meta.className = 'entry-meta';
          meta.textContent = item.meta;
          li.appendChild(meta);
        }

        if (item.summary) {
          const summary = document.createElement('div');
          summary.className = 'entry-summary';
          summary.textContent = item.summary;
          li.appendChild(summary);
        }

        return li;
      }

      async function main() {
        const response = await fetch('./data/latest.json', { cache: 'no-store' });
        const payload = await response.json();

        document.getElementById('site-title').textContent = payload.site.title;
        document.getElementById('site-subtitle').textContent = payload.site.subtitle;
        document.getElementById('generated-at').textContent = '页面生成时间：' + payload.site.generated_at;
        document.getElementById('site-mode').textContent = '页面模式：' + payload.site.mode;

        if (payload.latest.daily_input_generated_at) {
          document.getElementById('daily-generated-at').textContent =
            '输入扫描时间：' + payload.latest.daily_input_generated_at;
        }

        document.getElementById('latest-date').textContent = payload.latest.date;
        document.getElementById('latest-headline').textContent = payload.latest.headline;
        document.getElementById('latest-summary').textContent = payload.latest.summary;
        document.getElementById('latest-mode').textContent = payload.latest.mode || '框架模式';

        const countsWrap = document.getElementById('daily-counts');
        const counts = payload.latest.daily_input_counts || {};
        Object.entries(counts).forEach(([label, value]) => {
          const box = document.createElement('div');
          box.className = 'count-box';
          const labelMap = {
            sources_ok: '成功信源',
            sources_failed: '失败信源',
            items_total: '候选条目',
          };
          box.innerHTML = '<strong>' + value + '</strong><span>' + (labelMap[label] || label.replaceAll('_', ' ')) + '</span>';
          countsWrap.appendChild(box);
        });

        const sectionWrap = document.getElementById('latest-sections');
        const watchpointsWrap = document.getElementById('watchpoints');
        (payload.latest.watchpoints || []).forEach((item) => {
          const chip = document.createElement('div');
          chip.className = 'watchpoint';
          chip.textContent = item;
          watchpointsWrap.appendChild(chip);
        });

        payload.latest.sections.forEach((section) => {
          const article = document.createElement('article');
          article.className = 'section-card';
          const title = document.createElement('h3');
          title.textContent = section.title;
          if (section.hint) {
            const hint = document.createElement('p');
            hint.className = 'section-hint';
            hint.textContent = section.hint;
            article.appendChild(title);
            article.appendChild(hint);
          } else {
            article.appendChild(title);
          }
          const list = document.createElement('ul');
          section.items.forEach((item) => {
            list.appendChild(renderSectionItem(item));
          });
          article.appendChild(list);
          sectionWrap.appendChild(article);
        });

        const sourceWrap = document.getElementById('source-docs');
        payload.latest.source_documents.forEach((source) => {
          const row = document.createElement('div');
          row.className = 'source-item';
          row.textContent = source;
          sourceWrap.appendChild(row);
        });

        document.getElementById('monitoring-strategy').textContent = payload.latest.monitoring_strategy;
        const monitoringNotesWrap = document.getElementById('monitoring-notes');
        (payload.latest.monitoring_notes || []).forEach((note) => {
          const noteRow = document.createElement('div');
          noteRow.className = 'note-row';
          noteRow.textContent = note;
          monitoringNotesWrap.appendChild(noteRow);
        });

        const monitoringWrap = document.getElementById('monitoring-sources');
        payload.latest.monitoring_sources.forEach((source) => {
          const row = document.createElement('div');
          row.className = 'source-item';
          const categoryMap = {
            'official-primary': '官方一级',
            'official-secondary': '官方二级',
            'media-alert': '媒体预警',
          };
          const trustMap = {
            primary: '一手',
            secondary: '二手',
          };
          row.innerHTML =
            '<strong>' + source.name + '</strong>' +
            '<span>' + (categoryMap[source.category] || source.category) + ' | ' + source.priority + ' | ' + source.region + ' | ' + (trustMap[source.trust_level] || source.trust_level) + '</span>' +
            '<span>更新频率：' + source.cadence + '</span>' +
            '<a class="repo-link" href="' + source.homepage_url + '" target="_blank" rel="noreferrer">' + source.homepage_url + '</a>' +
            '<span>' + source.notes + '</span>';
          monitoringWrap.appendChild(row);
        });

        const historyWrap = document.getElementById('history-list');
        payload.history.forEach((item) => {
          const row = document.createElement('div');
          row.className = 'history-item';
          row.innerHTML = '<strong>' + item.date + '</strong><span>' + item.headline + '</span><em>' + item.status + '</em>';
          historyWrap.appendChild(row);
        });
      }

      main().catch((error) => {
        console.error(error);
        document.getElementById('site-title').textContent = '宏观日报';
        document.getElementById('site-subtitle').textContent = '站点数据加载失败。';
      });
    </script>
  </body>
</html>
